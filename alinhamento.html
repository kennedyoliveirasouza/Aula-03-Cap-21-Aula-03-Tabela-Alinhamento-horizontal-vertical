<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alinhamento em tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
            /* Alinhamento padrão */
            text-align: center;      
            vertical-align: middle;  
        }
    </style>
</head>
<body>
    <style>
 td {
            border: 1px solid black;
            padding: 8px;
            /* Alinhamento horizontal 
                - center - centro
                - left - esquerda
                - right - direita
            */
            text-align: center;
            /* Alinhamento vertical
                - top - em cima
                - bottom - em baixo
                - middle - no centro
            */
            vertical-align: middle;
        }
        .conf1{
            text-align: left;
            vertical-align: top;
        }

        .numero {
            text-align: right;
        } 
        
        .ali{
            text-align: center;
            vertical-align: top;
        }
        
        .ati{
            text-align: right;
            vertical-align: top;
        }

        .ari{
            text-align: center;
            vertical-align: top;
        }
        .asi{
            text-align: center;
            vertical-align: middle;
        }
        .adi{
            text-align: center;
            vertical-align: bottom;
        }
        .afi{
            text-align: center;
            vertical-align: top;
        }
        .ami{
            text-align: center;
            vertical-align: bottom;
        }
        .ogi{
            text-align: center;
            vertical-align: middle;
        }
        
    








    </style>
    <table>
        <tr> <!-- Primeira linha -->
            <td class="conf1">A1</td>
            <td class="ali">B1</td>
            <td class="ati">C1</td>
        </tr>
        <tr><!-- Segunda linha -->
            <td class="ari">A2</td>
            <td class="asi">B2</td>
            <td class="adi">C2</td>
        </tr>
        <tr> <!-- Terceira linha -->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr> <!-- Quarta linha -->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
    
</body>
</html>
